<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📚 圖書館打卡相機</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --ink: #1a1209;
    --parchment: #f5edd6;
    --amber: #d4840a;
    --gold: #e8a030;
    --rust: #8b3a0f;
    --cream: #fdf6e3;
    --shadow: rgba(26,18,9,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Decorative top bar */
  .top-bar {
    width: 100%;
    background: linear-gradient(90deg, var(--rust), var(--amber), var(--gold), var(--amber), var(--rust));
    height: 6px;
  }

  header {
    width: 100%;
    max-width: 480px;
    text-align: center;
    padding: 24px 20px 12px;
    position: relative;
  }

  .logo-mark {
    font-size: 2.6rem;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(228,160,48,0.5));
    margin-bottom: 4px;
  }

  header h1 {
    color: var(--gold);
    font-size: 1.4rem;
    letter-spacing: 0.12em;
    font-weight: 900;
    text-shadow: 0 2px 12px rgba(228,160,48,0.3);
  }

  header p {
    color: var(--parchment);
    opacity: 0.75;
    font-size: 0.82rem;
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* Step indicator */
  .steps {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 10px 0 14px;
    justify-content: center;
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--amber);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    color: var(--amber);
    transition: all 0.3s;
    cursor: default;
  }
  .step-dot.active {
    background: var(--amber);
    color: var(--ink);
    font-weight: 700;
    box-shadow: 0 0 12px rgba(228,160,48,0.5);
  }
  .step-dot.done {
    background: var(--rust);
    border-color: var(--rust);
    color: var(--parchment);
  }
  .step-line { width: 28px; height: 2px; background: var(--amber); opacity: 0.35; }

  /* Main container */
  main {
    width: 100%;
    max-width: 480px;
    padding: 0 16px 32px;
    flex: 1;
  }

  /* Card panel */
  .card {
    background: linear-gradient(160deg, var(--cream), #f0e6c8);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.6);
    border: 1px solid rgba(212,132,10,0.25);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust));
  }

  /* Section headings inside card */
  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rust);
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
    font-weight: 700;
  }

  /* Background picker */
  .bg-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }

  .bg-thumb {
    aspect-ratio: 4/3;
    border-radius: 8px;
    cursor: pointer;
    overflow: hidden;
    border: 3px solid transparent;
    transition: all 0.2s;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .bg-thumb:hover { transform: scale(1.04); }
  .bg-thumb.selected {
    border-color: var(--amber);
    box-shadow: 0 0 0 2px var(--amber), 0 4px 16px rgba(212,132,10,0.4);
  }

  .bg-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .bg-thumb .check {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px;
    background: var(--amber);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .bg-thumb.selected .check { opacity: 1; }

  .bg-thumb .bg-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(26,18,9,0.7));
    color: #fff;
    font-size: 0.62rem;
    padding: 8px 4px 3px;
    text-align: center;
    font-family: 'Space Mono', monospace;
  }

  /* Camera area */
  .camera-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 12px;
    overflow: hidden;
    background: #111;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  #bgCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  #videoEl {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 2;
    transform: scaleX(-1);
  }

  #overlayCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  .frame-overlay {
    position: absolute; inset: 0;
    z-index: 4;
    pointer-events: none;
    border: 5px solid var(--gold);
    border-radius: 12px;
    box-shadow: inset 0 0 30px rgba(212,132,10,0.15);
  }

  .corner {
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--gold);
    border-style: solid;
  }
  .corner.tl { top: 8px; left: 8px; border-width: 3px 0 0 3px; }
  .corner.tr { top: 8px; right: 8px; border-width: 3px 3px 0 0; }
  .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 3px 3px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 3px 3px 0; }

  .cam-badge {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(26,18,9,0.7);
    color: var(--gold);
    font-size: 0.65rem;
    font-family: 'Space Mono', monospace;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(212,132,10,0.4);
    letter-spacing: 0.1em;
    z-index: 5;
    backdrop-filter: blur(4px);
  }

  .countdown-display {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 6;
    font-size: 7rem;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 30px rgba(228,160,48,0.8), 0 4px 20px rgba(0,0,0,0.6);
    font-family: 'Space Mono', monospace;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .flash-overlay {
    position: absolute; inset: 0;
    background: white;
    z-index: 7;
    opacity: 0;
    pointer-events: none;
    border-radius: 12px;
  }

  /* Buttons */
  .btn-row {
    display: flex; gap: 10px; justify-content: center;
    margin-bottom: 14px;
  }

  .btn {
    flex: 1;
    padding: 13px 12px;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.04em;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--amber), var(--gold));
    color: var(--ink);
    box-shadow: 0 4px 16px rgba(212,132,10,0.45);
  }
  .btn-primary:hover { box-shadow: 0 6px 24px rgba(212,132,10,0.6); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent;
    color: var(--rust);
    border: 2px solid var(--rust);
  }
  .btn-secondary:hover { background: rgba(139,58,15,0.08); }

  .btn-download {
    background: linear-gradient(135deg, #2d6a2d, #3d8b3d);
    color: #e8ffe8;
    box-shadow: 0 4px 16px rgba(45,106,45,0.4);
  }
  .btn-download:hover { box-shadow: 0 6px 24px rgba(45,106,45,0.55); transform: translateY(-1px); }

  /* Result photo */
  #resultPhoto {
    width: 100%;
    border-radius: 12px;
    display: none;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    margin-bottom: 14px;
    border: 3px solid var(--gold);
  }

  /* Start cam prompt */
  .cam-prompt {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: rgba(255,255,255,0.5);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    text-align: center;
    padding: 20px;
    position: absolute; inset: 0; z-index: 2;
  }

  .cam-prompt-icon { font-size: 2.5rem; }

  /* Step screens */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Result share area */
  .share-hint {
    text-align: center;
    font-size: 0.75rem;
    color: var(--rust);
    font-family: 'Space Mono', monospace;
    margin-top: 8px;
    opacity: 0.8;
  }

  /* Stamp decoration */
  .stamp {
    position: absolute; bottom: 14px; right: 14px;
    width: 54px; height: 54px;
    border: 2.5px solid var(--rust);
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0.25;
    transform: rotate(-18deg);
    pointer-events: none;
  }
  .stamp span { font-size: 0.42rem; color: var(--rust); letter-spacing: 0.08em; font-family: 'Space Mono', monospace; line-height: 1.4; text-align: center; }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--ink);
    color: var(--gold);
    border: 1px solid var(--amber);
    padding: 10px 24px;
    border-radius: 30px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 100;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* No-camera fallback */
  .no-camera {
    text-align: center;
    padding: 30px 20px;
    color: var(--rust);
    font-size: 0.85rem;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="top-bar"></div>

<header>
  <span class="logo-mark">📚</span>
  <h1>圖書館打卡相機</h1>
  <p>選背景 → 拍照 → 下載分享</p>
  <div class="steps">
    <div class="step-dot active" id="dot1">1</div>
    <div class="step-line"></div>
    <div class="step-dot" id="dot2">2</div>
    <div class="step-line"></div>
    <div class="step-dot" id="dot3">3</div>
  </div>
</header>

<main>

<!-- STEP 1: Choose background -->
<div class="screen active" id="screen1">
  <div class="card">
    <div class="section-label">✦ 選擇虛擬背景</div>
    <div class="bg-grid" id="bgGrid"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="goToCamera" disabled>
        開啟相機 →
      </button>
    </div>
    <div class="stamp">
      <span>圖書館</span>
      <span>LIBRARY</span>
      <span>PHOTO</span>
    </div>
  </div>
</div>

<!-- STEP 2: Camera + shoot -->
<div class="screen" id="screen2">
  <div class="card">
    <div class="section-label">✦ 拍攝留影</div>
    <div class="camera-wrapper" id="cameraWrapper">
      <canvas id="bgCanvas"></canvas>
      <video id="videoEl" autoplay playsinline muted></video>
      <canvas id="overlayCanvas"></canvas>
      <div class="frame-overlay">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
      <div class="cam-badge" id="camBadge">📚 圖書館打卡</div>
      <div class="countdown-display" id="countdown"></div>
      <div class="flash-overlay" id="flashOverlay"></div>
      <div class="cam-prompt" id="camPrompt">
        <div class="cam-prompt-icon">📷</div>
        <div>正在啟動相機…</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="backBtn">← 換背景</button>
      <button class="btn btn-primary" id="shootBtn" disabled>📸 拍照</button>
    </div>
  </div>
</div>

<!-- STEP 3: Result -->
<div class="screen" id="screen3">
  <div class="card">
    <div class="section-label">✦ 拍攝完成！</div>
    <canvas id="finalCanvas" style="width:100%;border-radius:12px;border:3px solid var(--gold);margin-bottom:14px;display:block;"></canvas>
    <div class="btn-row">
      <button class="btn btn-secondary" id="retakeBtn">↩ 重拍</button>
      <button class="btn btn-download" id="downloadBtn">⬇ 儲存相片</button>
    </div>
    <div class="share-hint">長按圖片可直接儲存 或 點擊「儲存相片」下載</div>
  </div>
</div>

</main>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// BACKGROUND DEFINITIONS
// ============================================================
const BACKGROUNDS = [
  {
    name: '古典書牆',
    emoji: '🏛️',
    draw: (ctx, w, h) => {
      // Rich library background
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0, '#2c1a0e');
      g.addColorStop(1, '#1a0d05');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
      // Bookshelves
      const colors = ['#8B2500','#1a4a8a','#1a6b1a','#8B6914','#5a1a5a','#1a5a5a','#6b3a1a','#4a1a1a'];
      const rows = 5;
      const shelfH = h / rows;
      for (let r = 0; r < rows; r++) {
        const y = r * shelfH;
        ctx.fillStyle = '#3d1f0a';
        ctx.fillRect(0, y + shelfH - 8, w, 8);
        let x = 4;
        while (x < w) {
          const bw = 14 + Math.random()*22;
          const bh = shelfH * (0.55 + Math.random()*0.35);
          const col = colors[Math.floor(Math.random()*colors.length)];
          ctx.fillStyle = col;
          ctx.fillRect(x, y + shelfH - bh - 8, bw - 2, bh);
          // spine highlight
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          ctx.fillRect(x, y + shelfH - bh - 8, 3, bh);
          x += bw;
        }
      }
      // Warm vignette
      const vg = ctx.createRadialGradient(w/2,h/2,w*0.2,w/2,h/2,w*0.9);
      vg.addColorStop(0,'rgba(0,0,0,0)');
      vg.addColorStop(1,'rgba(0,0,0,0.55)');
      ctx.fillStyle = vg;
      ctx.fillRect(0,0,w,h);
      // Lamplight glow top
      const lamp = ctx.createRadialGradient(w/2,0,0,w/2,0,h*0.7);
      lamp.addColorStop(0,'rgba(220,140,30,0.25)');
      lamp.addColorStop(1,'rgba(220,140,30,0)');
      ctx.fillStyle = lamp;
      ctx.fillRect(0,0,w,h);
    }
  },
  {
    name: '森林閱讀角',
    emoji: '🌿',
    draw: (ctx, w, h) => {
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,'#1b3a1b');
      g.addColorStop(0.5,'#2d5a2d');
      g.addColorStop(1,'#1a2e1a');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
      // Tree trunks
      ctx.fillStyle = '#3d2010';
      for (let i = 0; i < 5; i++) {
        const tx = (i/4)*w;
        const tw = 20 + Math.random()*15;
        ctx.fillRect(tx - tw/2, 0, tw, h);
      }
      // Foliage blobs
      for (let i = 0; i < 30; i++) {
        const fx = Math.random()*w;
        const fy = Math.random()*h*0.7;
        const fr = 30 + Math.random()*60;
        const fg = ctx.createRadialGradient(fx,fy,0,fx,fy,fr);
        const green = `hsl(${110+Math.random()*30},${50+Math.random()*30}%,${20+Math.random()*20}%)`;
        fg.addColorStop(0, green);
        fg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fg;
        ctx.beginPath(); ctx.arc(fx,fy,fr,0,Math.PI*2); ctx.fill();
      }
      // Light rays
      ctx.save();
      for (let i = 0; i < 4; i++) {
        const rx = w*0.1 + i*(w*0.25);
        ctx.fillStyle = 'rgba(200,230,150,0.06)';
        ctx.beginPath();
        ctx.moveTo(rx, 0);
        ctx.lineTo(rx + 30, 0);
        ctx.lineTo(rx + 80, h);
        ctx.lineTo(rx + 50, h);
        ctx.fill();
      }
      ctx.restore();
      // Ground glow
      const gnd = ctx.createLinearGradient(0,h*0.7,0,h);
      gnd.addColorStop(0,'rgba(60,90,30,0)');
      gnd.addColorStop(1,'rgba(20,40,10,0.8)');
      ctx.fillStyle = gnd;
      ctx.fillRect(0,h*0.7,w,h*0.3);
    }
  },
  {
    name: '星空夜讀',
    emoji: '🌙',
    draw: (ctx, w, h) => {
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,'#02030f');
      g.addColorStop(0.5,'#0a0a2e');
      g.addColorStop(1,'#0d0618');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
      // Stars
      for (let i = 0; i < 180; i++) {
        const sx = Math.random()*w;
        const sy = Math.random()*h*0.85;
        const sr = Math.random()*1.8;
        ctx.fillStyle = `rgba(255,255,255,${0.3+Math.random()*0.7})`;
        ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
      }
      // Moon
      ctx.fillStyle = '#fef0c0';
      ctx.shadowColor = '#ffe066';
      ctx.shadowBlur = 30;
      ctx.beginPath(); ctx.arc(w*0.75, h*0.12, 36, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0a0a2e';
      ctx.beginPath(); ctx.arc(w*0.75+14, h*0.12-8, 30, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      // Milky way band
      const mw = ctx.createLinearGradient(0,h*0.1,w,h*0.6);
      mw.addColorStop(0,'rgba(100,80,200,0)');
      mw.addColorStop(0.4,'rgba(100,80,200,0.07)');
      mw.addColorStop(0.6,'rgba(150,120,220,0.05)');
      mw.addColorStop(1,'rgba(100,80,200,0)');
      ctx.fillStyle = mw;
      ctx.fillRect(0,0,w,h);
    }
  },
  {
    name: '咖啡書屋',
    emoji: '☕',
    draw: (ctx, w, h) => {
      // Warm cafe
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,'#3b1e0a');
      g.addColorStop(1,'#1e0d04');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
      // Brick wall pattern
      for (let row = 0; row < Math.ceil(h/22); row++) {
        const offset = (row%2)*40;
        for (let col = -1; col < Math.ceil(w/80)+1; col++) {
          const bx = col*80 + offset;
          const by = row*22;
          ctx.fillStyle = `hsl(${15+Math.random()*10},${40+Math.random()*20}%,${18+Math.random()*8}%)`;
          ctx.fillRect(bx+1, by+1, 76, 18);
          ctx.fillStyle = 'rgba(0,0,0,0.4)';
          ctx.fillRect(bx+1, by+1, 76, 1);
        }
      }
      // Warm window glow
      const wg = ctx.createRadialGradient(w*0.5,h*0.3,20,w*0.5,h*0.3,h*0.5);
      wg.addColorStop(0,'rgba(255,180,60,0.35)');
      wg.addColorStop(1,'rgba(255,120,20,0)');
      ctx.fillStyle = wg;
      ctx.fillRect(0,0,w,h);
      // Table surface
      const tg = ctx.createLinearGradient(0,h*0.72,0,h);
      tg.addColorStop(0,'#5c3010');
      tg.addColorStop(1,'#2e1808');
      ctx.fillStyle = tg;
      ctx.fillRect(0,h*0.72,w,h*0.28);
      // Steam wiggles (decorative)
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 2;
      for (let s = 0; s < 3; s++) {
        ctx.beginPath();
        const sx = w*0.25 + s*w*0.25;
        ctx.moveTo(sx, h*0.82);
        ctx.bezierCurveTo(sx-8,h*0.77,sx+8,h*0.72,sx,h*0.67);
        ctx.stroke();
      }
    }
  },
  {
    name: '霓虹書城',
    emoji: '🌈',
    draw: (ctx, w, h) => {
      ctx.fillStyle = '#050510';
      ctx.fillRect(0,0,w,h);
      // Neon grid floor
      ctx.strokeStyle = 'rgba(0,200,255,0.15)';
      ctx.lineWidth = 1;
      const vp = {x: w/2, y: h*0.55};
      for (let i = 0; i <= 14; i++) {
        const fx = (i/14)*w;
        ctx.beginPath();
        ctx.moveTo(fx, h);
        ctx.lineTo(vp.x, vp.y);
        ctx.stroke();
      }
      for (let j = 1; j <= 8; j++) {
        const t = j/8;
        const lx = vp.x + (0 - vp.x)*t;
        const rx = vp.x + (w - vp.x)*t;
        const ly = vp.y + (h - vp.y)*t;
        ctx.beginPath();
        ctx.moveTo(lx, ly); ctx.lineTo(rx, ly);
        ctx.stroke();
      }
      // Neon sign glow
      const neons = [
        {x:w*0.2,y:h*0.2,r:60,col:'rgba(255,0,180,0.25)'},
        {x:w*0.8,y:h*0.15,r:50,col:'rgba(0,200,255,0.2)'},
        {x:w*0.5,y:h*0.1,r:70,col:'rgba(120,0,255,0.2)'},
      ];
      neons.forEach(n => {
        const ng = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
        ng.addColorStop(0,n.col);
        ng.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle = ng;
        ctx.fillRect(0,0,w,h);
      });
      // Book silhouettes on shelves
      ctx.fillStyle = 'rgba(0,200,255,0.12)';
      for (let i = 0; i < 3; i++) {
        const ry = h*0.3 + i*h*0.12;
        ctx.fillRect(0,ry,w,4);
        let bx2 = 0;
        while (bx2 < w) {
          const bw = 12+Math.random()*20;
          const bh2 = 30+Math.random()*40;
          ctx.fillStyle = `rgba(${Math.random()>0.5?'0,200,255':'255,0,180'},0.15)`;
          ctx.fillRect(bx2+1, ry-bh2, bw-2, bh2);
          bx2 += bw;
        }
      }
    }
  },
  {
    name: '花園讀書台',
    emoji: '🌸',
    draw: (ctx, w, h) => {
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,'#87ceeb');
      g.addColorStop(0.55,'#c8e8b0');
      g.addColorStop(1,'#6aaa40');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
      // Clouds
      function cloud(cx,cy,cr,a) {
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        [[0,0,cr],[cr*0.8,cr*0.2,cr*0.7],[-cr*0.8,cr*0.15,cr*0.65],[cr*1.5,0,cr*0.5],[-cr*1.5,0,cr*0.45]].forEach(([ox,oy,or]) => {
          ctx.beginPath(); ctx.arc(cx+ox,cy+oy,or,0,Math.PI*2); ctx.fill();
        });
      }
      cloud(w*0.2,h*0.12,24,0.85);
      cloud(w*0.7,h*0.08,18,0.8);
      cloud(w*0.5,h*0.18,20,0.7);
      // Flowers
      function flower(fx,fy,size,col) {
        for (let p = 0; p < 6; p++) {
          const a = (p/6)*Math.PI*2;
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.arc(fx+Math.cos(a)*size*0.8, fy+Math.sin(a)*size*0.8, size*0.55, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.fillStyle = '#ffe066';
        ctx.beginPath(); ctx.arc(fx,fy,size*0.45,0,Math.PI*2); ctx.fill();
      }
      const flowerColors = ['#ffb7d5','#ff9ee0','#e8b4ff','#ffcce0','#ffd6b8'];
      for (let i = 0; i < 20; i++) {
        flower(Math.random()*w, h*0.55+Math.random()*h*0.45, 8+Math.random()*12, flowerColors[Math.floor(Math.random()*flowerColors.length)]);
      }
      // Sunbeam
      const sun = ctx.createRadialGradient(w*0.85,h*0.05,0,w*0.85,h*0.05,h*0.6);
      sun.addColorStop(0,'rgba(255,220,80,0.3)');
      sun.addColorStop(1,'rgba(255,220,80,0)');
      ctx.fillStyle = sun;
      ctx.fillRect(0,0,w,h);
    }
  },
];

// ============================================================
// STATE
// ============================================================
let selectedBg = null;
let stream = null;
let cameraReady = false;
let shooting = false;

const bgGrid = document.getElementById('bgGrid');
const goToCamera = document.getElementById('goToCamera');
const screen1 = document.getElementById('screen1');
const screen2 = document.getElementById('screen2');
const screen3 = document.getElementById('screen3');
const videoEl = document.getElementById('videoEl');
const bgCanvas = document.getElementById('bgCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const finalCanvas = document.getElementById('finalCanvas');
const shootBtn = document.getElementById('shootBtn');
const backBtn = document.getElementById('backBtn');
const retakeBtn = document.getElementById('retakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const countdown = document.getElementById('countdown');
const flashOverlay = document.getElementById('flashOverlay');
const camPrompt = document.getElementById('camPrompt');
const dot1 = document.getElementById('dot1');
const dot2 = document.getElementById('dot2');
const dot3 = document.getElementById('dot3');
const toast = document.getElementById('toast');
const cameraWrapper = document.getElementById('cameraWrapper');

// Build background grid
BACKGROUNDS.forEach((bg, i) => {
  const div = document.createElement('div');
  div.className = 'bg-thumb';
  div.innerHTML = `<div class="check">✓</div><div class="bg-name">${bg.emoji} ${bg.name}</div>`;
  // Draw preview
  const previewCanvas = document.createElement('canvas');
  previewCanvas.width = 120; previewCanvas.height = 90;
  const pctx = previewCanvas.getContext('2d');
  bg.draw(pctx, 120, 90);
  div.insertBefore(previewCanvas, div.firstChild);
  div.addEventListener('click', () => {
    document.querySelectorAll('.bg-thumb').forEach(t => t.classList.remove('selected'));
    div.classList.add('selected');
    selectedBg = bg;
    goToCamera.disabled = false;
    goToCamera.textContent = `開啟相機 →`;
  });
  bgGrid.appendChild(div);
});

// ============================================================
// NAVIGATION
// ============================================================
function showScreen(n) {
  screen1.classList.remove('active');
  screen2.classList.remove('active');
  screen3.classList.remove('active');
  [dot1,dot2,dot3].forEach((d,i)=>{
    d.classList.remove('active','done');
    if(i+1 < n) d.classList.add('done');
    else if(i+1 === n) d.classList.add('active');
  });
  if(n===1) screen1.classList.add('active');
  if(n===2) screen2.classList.add('active');
  if(n===3) screen3.classList.add('active');
}

goToCamera.addEventListener('click', async () => {
  showScreen(2);
  await startCamera();
});

backBtn.addEventListener('click', () => {
  stopCamera();
  showScreen(1);
});

retakeBtn.addEventListener('click', () => {
  showScreen(2);
  startCamera();
});

// ============================================================
// CAMERA
// ============================================================
async function startCamera() {
  cameraReady = false;
  shootBtn.disabled = true;
  camPrompt.style.display = 'flex';
  camPrompt.innerHTML = `<div class="cam-prompt-icon">📷</div><div>正在啟動相機…</div>`;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 960 } },
      audio: false
    });
    videoEl.srcObject = stream;
    videoEl.onloadedmetadata = () => {
      videoEl.play();
      cameraReady = true;
      camPrompt.style.display = 'none';
      shootBtn.disabled = false;
      resizeCanvases();
      renderBgLoop();
      renderOverlay();
    };
  } catch(e) {
    camPrompt.innerHTML = `<div class="cam-prompt-icon">⚠️</div><div>無法取得相機權限<br><small>請允許瀏覽器使用相機</small></div>`;
    console.error(e);
  }
}

function stopCamera() {
  cameraReady = false;
  if(stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

function resizeCanvases() {
  const rect = cameraWrapper.getBoundingClientRect();
  const W = Math.round(rect.width * devicePixelRatio);
  const H = Math.round(rect.height * devicePixelRatio);
  bgCanvas.width = W; bgCanvas.height = H;
  bgCanvas.style.width = rect.width + 'px';
  bgCanvas.style.height = rect.height + 'px';
  overlayCanvas.width = W; overlayCanvas.height = H;
  overlayCanvas.style.width = rect.width + 'px';
  overlayCanvas.style.height = rect.height + 'px';
}

let bgAnimFrame = null;
function renderBgLoop() {
  if(!cameraReady) return;
  const ctx = bgCanvas.getContext('2d');
  if(selectedBg) selectedBg.draw(ctx, bgCanvas.width, bgCanvas.height);
  bgAnimFrame = requestAnimationFrame(renderBgLoop);
}

function renderOverlay() {
  if(!cameraReady) return;
  const ctx = overlayCanvas.getContext('2d');
  ctx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  // Watermark
  ctx.save();
  ctx.font = `bold ${Math.round(overlayCanvas.width*0.034)}px 'Space Mono', monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.textAlign = 'right';
  ctx.fillText('📚 圖書館打卡', overlayCanvas.width - 16, overlayCanvas.height - 14);
  ctx.restore();
  requestAnimationFrame(renderOverlay);
}

// ============================================================
// SHOOT with countdown
// ============================================================
shootBtn.addEventListener('click', () => {
  if(shooting || !cameraReady) return;
  shooting = true;
  shootBtn.disabled = true;
  backBtn.disabled = true;
  let count = 3;
  countdown.style.opacity = '1';
  countdown.textContent = count;

  const tick = setInterval(() => {
    count--;
    if(count > 0) {
      countdown.textContent = count;
    } else {
      clearInterval(tick);
      countdown.style.opacity = '0';
      takePhoto();
    }
  }, 900);
});

function takePhoto() {
  // Flash effect
  flashOverlay.style.transition = 'opacity 0.08s';
  flashOverlay.style.opacity = '1';
  setTimeout(() => {
    flashOverlay.style.transition = 'opacity 0.5s';
    flashOverlay.style.opacity = '0';
  }, 80);

  const W = bgCanvas.width;
  const H = bgCanvas.height;

  finalCanvas.width = W;
  finalCanvas.height = H;
  const fctx = finalCanvas.getContext('2d');

  // 1. Draw background
  if(selectedBg) selectedBg.draw(fctx, W, H);

  // 2. Draw video frame (mirrored)
  fctx.save();
  fctx.translate(W, 0);
  fctx.scale(-1, 1);
  fctx.drawImage(videoEl, 0, 0, W, H);
  fctx.restore();

  // 3. Gold frame
  fctx.strokeStyle = '#e8a030';
  fctx.lineWidth = Math.max(4, W*0.008);
  const inset = fctx.lineWidth / 2;
  roundRect(fctx, inset, inset, W - inset*2, H - inset*2, 16);
  fctx.stroke();

  // 4. Corners
  const cs = W * 0.07;
  const ci = 18;
  fctx.strokeStyle = '#e8a030';
  fctx.lineWidth = Math.max(3, W*0.006);
  [[ci,ci,1,1],[W-ci,ci,-1,1],[ci,H-ci,1,-1],[W-ci,H-ci,-1,-1]].forEach(([cx,cy,dx,dy]) => {
    fctx.beginPath();
    fctx.moveTo(cx+dx*cs,cy); fctx.lineTo(cx,cy); fctx.lineTo(cx,cy+dy*cs);
    fctx.stroke();
  });

  // 5. Watermark badge
  const fs = Math.round(W * 0.038);
  fctx.font = `bold ${fs}px 'Space Mono', monospace`;
  const text = '📚 圖書館打卡';
  const tw = fctx.measureText(text).width + 24;
  const bx = W - tw - 12;
  const by = H - fs - 20;
  fctx.fillStyle = 'rgba(26,18,9,0.65)';
  roundRect(fctx, bx, by, tw, fs+14, 8);
  fctx.fill();
  fctx.fillStyle = '#e8a030';
  fctx.textAlign = 'center';
  fctx.fillText(text, bx + tw/2, by + fs + 3);

  stopCamera();
  showScreen(3);
  shooting = false;
  shootBtn.disabled = false;
  backBtn.disabled = false;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ============================================================
// DOWNLOAD
// ============================================================
downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `圖書館打卡_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.png`;
  link.href = finalCanvas.toDataURL('image/png');
  link.click();
  showToast('📥 相片已儲存！');
});

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Resize handling
window.addEventListener('resize', () => { if(cameraReady) resizeCanvases(); });
</script>
