<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📚 圖書館打卡相機</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --ink: #1a1209;
    --parchment: #f5edd6;
    --amber: #d4840a;
    --gold: #e8a030;
    --rust: #8b3a0f;
    --cream: #fdf6e3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .top-bar {
    width: 100%;
    background: linear-gradient(90deg, var(--rust), var(--amber), var(--gold), var(--amber), var(--rust));
    height: 6px;
  }

  header {
    width: 100%;
    max-width: 480px;
    text-align: center;
    padding: 20px 20px 10px;
  }

  .logo-mark { font-size: 2.4rem; display: block; margin-bottom: 4px; }

  header h1 {
    color: var(--gold);
    font-size: 1.4rem;
    letter-spacing: 0.12em;
    font-weight: 900;
  }

  header p {
    color: var(--parchment);
    opacity: 0.7;
    font-size: 0.78rem;
    margin-top: 3px;
    font-family: 'Space Mono', monospace;
  }

  .steps {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 10px 0 12px;
    justify-content: center;
  }
  .step-dot {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--amber);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem;
    font-family: 'Space Mono', monospace;
    color: var(--amber);
    transition: all 0.3s;
  }
  .step-dot.active { background: var(--amber); color: var(--ink); font-weight: 700; box-shadow: 0 0 10px rgba(228,160,48,0.5); }
  .step-dot.done { background: var(--rust); border-color: var(--rust); color: var(--parchment); }
  .step-line { width: 26px; height: 2px; background: var(--amber); opacity: 0.3; }

  main { width: 100%; max-width: 480px; padding: 0 14px 32px; flex: 1; }

  .card {
    background: linear-gradient(160deg, var(--cream), #f0e6c8);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.6);
    border: 1px solid rgba(212,132,10,0.25);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust));
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--rust);
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .bg-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 7px;
    margin-bottom: 14px;
  }

  .bg-thumb {
    aspect-ratio: 4/3;
    border-radius: 8px;
    cursor: pointer;
    overflow: hidden;
    border: 3px solid transparent;
    transition: all 0.2s;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .bg-thumb:hover { transform: scale(1.04); }
  .bg-thumb.selected { border-color: var(--amber); box-shadow: 0 0 0 2px var(--amber), 0 4px 16px rgba(212,132,10,0.4); }
  .bg-thumb canvas { width: 100%; height: 100%; display: block; }
  .bg-thumb .check {
    position: absolute; top: 4px; right: 4px;
    width: 18px; height: 18px;
    background: var(--amber); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; opacity: 0; transition: opacity 0.2s;
  }
  .bg-thumb.selected .check { opacity: 1; }
  .bg-thumb .bg-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(26,18,9,0.75));
    color: #fff; font-size: 0.58rem; padding: 8px 3px 3px;
    text-align: center; font-family: 'Space Mono', monospace;
  }

  /* Camera */
  .camera-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 12px;
    overflow: hidden;
    background: #111;
    margin-bottom: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  #compositeCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 2;
    border-radius: 12px;
  }

  /* Hidden elements for processing */
  #videoEl { display: none; }
  #segCanvas { display: none; }

  .frame-overlay {
    position: absolute; inset: 0;
    z-index: 3;
    pointer-events: none;
    border: 4px solid var(--gold);
    border-radius: 12px;
  }
  .corner { position: absolute; width: 20px; height: 20px; border-color: var(--gold); border-style: solid; }
  .corner.tl { top: 8px; left: 8px; border-width: 3px 0 0 3px; }
  .corner.tr { top: 8px; right: 8px; border-width: 3px 3px 0 0; }
  .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 3px 3px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 3px 3px 0; }

  .cam-badge {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(26,18,9,0.7);
    color: var(--gold); font-size: 0.62rem;
    font-family: 'Space Mono', monospace;
    padding: 3px 10px; border-radius: 20px;
    border: 1px solid rgba(212,132,10,0.4);
    z-index: 4; backdrop-filter: blur(4px);
  }

  .countdown-display {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    font-size: 7rem; font-weight: 900; color: white;
    text-shadow: 0 0 30px rgba(228,160,48,0.8), 0 4px 20px rgba(0,0,0,0.6);
    font-family: 'Space Mono', monospace;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }

  .flash-overlay {
    position: absolute; inset: 0;
    background: white; z-index: 6;
    opacity: 0; pointer-events: none; border-radius: 12px;
  }

  .cam-prompt {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: rgba(255,255,255,0.6);
    font-family: 'Space Mono', monospace; font-size: 0.78rem;
    text-align: center; padding: 20px;
  }
  .cam-prompt-icon { font-size: 2.2rem; }

  /* Filter selector */
  .filter-row {
    display: flex; gap: 7px; margin-bottom: 12px;
    overflow-x: auto; padding-bottom: 4px;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 12px;
    border-radius: 20px;
    border: 2px solid rgba(139,58,15,0.3);
    background: transparent;
    color: var(--rust);
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--ink);
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(212,132,10,0.4);
  }

  /* AI loading indicator */
  .ai-status {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(26,18,9,0.75);
    color: var(--gold); font-size: 0.58rem;
    font-family: 'Space Mono', monospace;
    padding: 3px 10px; border-radius: 20px;
    border: 1px solid rgba(212,132,10,0.3);
    z-index: 4; backdrop-filter: blur(4px);
    white-space: nowrap;
  }

  .btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; }

  .btn {
    flex: 1; padding: 12px 10px;
    border: none; border-radius: 10px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.92rem; font-weight: 700;
    cursor: pointer; transition: all 0.18s;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--amber), var(--gold));
    color: var(--ink);
    box-shadow: 0 4px 16px rgba(212,132,10,0.45);
  }
  .btn-primary:hover { box-shadow: 0 6px 24px rgba(212,132,10,0.6); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent; color: var(--rust);
    border: 2px solid var(--rust);
  }
  .btn-secondary:hover { background: rgba(139,58,15,0.08); }

  .btn-download {
    background: linear-gradient(135deg, #2d6a2d, #3d8b3d);
    color: #e8ffe8;
    box-shadow: 0 4px 16px rgba(45,106,45,0.4);
  }
  .btn-download:hover { box-shadow: 0 6px 24px rgba(45,106,45,0.55); transform: translateY(-1px); }

  .share-hint {
    text-align: center; font-size: 0.72rem;
    color: var(--rust); font-family: 'Space Mono', monospace;
    margin-top: 6px; opacity: 0.8;
  }

  /* Fullscreen overlay */
  .fullscreen-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .fullscreen-overlay.show { display: flex; }

  .fullscreen-overlay img {
    max-width: 100%;
    max-height: 75vh;
    border-radius: 12px;
    border: 3px solid var(--gold);
    box-shadow: 0 0 40px rgba(228,160,48,0.3);
  }

  .fullscreen-tip {
    margin-top: 20px;
    background: rgba(212,132,10,0.15);
    border: 1px solid var(--amber);
    border-radius: 12px;
    padding: 14px 20px;
    text-align: center;
    color: var(--parchment);
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.8;
    max-width: 320px;
  }
  .fullscreen-tip strong { color: var(--gold); font-size: 1rem; display: block; margin-bottom: 4px; }

  .fullscreen-close {
    margin-top: 16px;
    background: transparent;
    border: 2px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.6);
    padding: 10px 28px;
    border-radius: 30px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .fullscreen-close:hover { border-color: white; color: white; }

  .screen { display: none; }
  .screen.active { display: block; }

  .stamp {
    position: absolute; bottom: 12px; right: 12px;
    width: 50px; height: 50px;
    border: 2px solid var(--rust); border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0.2; transform: rotate(-18deg); pointer-events: none;
  }
  .stamp span { font-size: 0.4rem; color: var(--rust); letter-spacing: 0.06em; font-family: 'Space Mono', monospace; line-height: 1.4; text-align: center; }

  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--ink); color: var(--gold);
    border: 1px solid var(--amber);
    padding: 9px 22px; border-radius: 30px;
    font-family: 'Space Mono', monospace; font-size: 0.78rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 100; opacity: 0; transition: all 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Tip box */
  .tip-box {
    background: rgba(139,58,15,0.1);
    border: 1px solid rgba(139,58,15,0.3);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.72rem;
    color: var(--rust);
    font-family: 'Space Mono', monospace;
    margin-bottom: 12px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="top-bar"></div>

<header>
  <span class="logo-mark">📚</span>
  <h1>圖書館打卡相機</h1>
  <p>選背景 → 拍照 → 下載分享</p>
  <div class="steps">
    <div class="step-dot active" id="dot1">1</div>
    <div class="step-line"></div>
    <div class="step-dot" id="dot2">2</div>
    <div class="step-line"></div>
    <div class="step-dot" id="dot3">3</div>
  </div>
</header>

<main>

<!-- STEP 1 -->
<div class="screen active" id="screen1">
  <div class="card">
    <div class="section-label">✦ 選擇虛擬背景</div>
    <div class="bg-grid" id="bgGrid"></div>
    <div class="tip-box">💡 小提示：拍照時站在光線充足的地方，背景去除效果更好！</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="goToCamera" disabled>開啟相機 →</button>
    </div>
    <div class="stamp"><span>圖書館</span><span>LIBRARY</span><span>PHOTO</span></div>
  </div>
</div>

<!-- STEP 2 -->
<div class="screen" id="screen2">
  <div class="card">
    <div class="section-label">✦ 拍攝留影</div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="normal">🙂 原始</button>
      <button class="filter-btn" data-filter="cartoon">🎨 卡通</button>
      <button class="filter-btn" data-filter="sketch">✏️ 手繪</button>
      <button class="filter-btn" data-filter="both">✨ 卡通＋手繪</button>
    </div>
    <div class="camera-wrapper" id="cameraWrapper">
      <canvas id="compositeCanvas"></canvas>
      <video id="videoEl" autoplay playsinline muted></video>
      <canvas id="segCanvas"></canvas>
      <div class="frame-overlay">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
      <div class="cam-badge">📚 圖書館打卡</div>
      <div class="countdown-display" id="countdown"></div>
      <div class="flash-overlay" id="flashOverlay"></div>
      <div class="cam-prompt" id="camPrompt">
        <div class="cam-prompt-icon">📷</div>
        <div>正在載入 AI 去背模型…</div>
      </div>
      <div class="ai-status" id="aiStatus" style="display:none">✨ AI 去背啟動中</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="backBtn">← 換背景</button>
      <button class="btn btn-primary" id="shootBtn" disabled>📸 拍照</button>
    </div>
  </div>
</div>

<!-- STEP 3 -->
<div class="screen" id="screen3">
  <div class="card">
    <div class="section-label">✦ 拍攝完成！</div>
    <canvas id="finalCanvas" style="width:100%;border-radius:12px;border:3px solid var(--gold);margin-bottom:12px;display:block;"></canvas>
    <div class="btn-row">
      <button class="btn btn-secondary" id="retakeBtn">↩ 重拍</button>
      <button class="btn btn-download" id="downloadBtn">⬇ 儲存相片</button>
    </div>
    <div class="share-hint">點「儲存相片」→ 長按圖片 → 加入照片 📱</div>
  </div>
</div>

</main>

<!-- Fullscreen save overlay -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
  <img id="fullscreenImg" src="" alt="拍攝照片">
  <div class="fullscreen-tip">
    <strong>📱 長按圖片儲存到相簿</strong>
    iPhone：長按圖片 → 加入照片<br>
    Android：長按圖片 → 儲存圖片
  </div>
  <button class="fullscreen-close" id="fullscreenClose">✕ 關閉</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// BACKGROUNDS
// ============================================================
const BACKGROUNDS = [
  {
    name: '古典書牆', emoji: '🏛️',
    draw: (ctx, w, h) => {
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,'#2c1a0e'); g.addColorStop(1,'#1a0d05');
      ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
      const colors = ['#8B2500','#1a4a8a','#1a6b1a','#8B6914','#5a1a5a','#1a5a5a','#6b3a1a','#4a1a1a'];
      const rows = 5;
      for (let r = 0; r < rows; r++) {
        const shelfH = h/rows;
        const y = r*shelfH;
        ctx.fillStyle = '#3d1f0a';
        ctx.fillRect(0, y+shelfH-8, w, 8);
        let x = 4;
        while(x < w) {
          const bw = 14+Math.random()*22;
          const bh = shelfH*(0.55+Math.random()*0.35);
          ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
          ctx.fillRect(x, y+shelfH-bh-8, bw-2, bh);
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          ctx.fillRect(x, y+shelfH-bh-8, 3, bh);
          x += bw;
        }
      }
      const vg = ctx.createRadialGradient(w/2,h/2,w*0.2,w/2,h/2,w*0.9);
      vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.55)');
      ctx.fillStyle = vg; ctx.fillRect(0,0,w,h);
      const lamp = ctx.createRadialGradient(w/2,0,0,w/2,0,h*0.7);
      lamp.addColorStop(0,'rgba(220,140,30,0.25)'); lamp.addColorStop(1,'rgba(220,140,30,0)');
      ctx.fillStyle = lamp; ctx.fillRect(0,0,w,h);
    }
  },
  {
    name: '森林閱讀角', emoji: '🌿',
    draw: (ctx, w, h) => {
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,'#1b3a1b'); g.addColorStop(0.5,'#2d5a2d'); g.addColorStop(1,'#1a2e1a');
      ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
      ctx.fillStyle = '#3d2010';
      for(let i=0;i<5;i++){const tx=(i/4)*w;const tw=20+Math.random()*15;ctx.fillRect(tx-tw/2,0,tw,h);}
      for(let i=0;i<30;i++){
        const fx=Math.random()*w,fy=Math.random()*h*0.7,fr=30+Math.random()*60;
        const fg=ctx.createRadialGradient(fx,fy,0,fx,fy,fr);
        fg.addColorStop(0,`hsl(${110+Math.random()*30},${50+Math.random()*30}%,${20+Math.random()*20}%)`);
        fg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=fg;ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fill();
      }
      for(let i=0;i<4;i++){
        const rx=w*0.1+i*(w*0.25);
        ctx.fillStyle='rgba(200,230,150,0.06)';
        ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx+30,0);ctx.lineTo(rx+80,h);ctx.lineTo(rx+50,h);ctx.fill();
      }
      const gnd=ctx.createLinearGradient(0,h*0.7,0,h);
      gnd.addColorStop(0,'rgba(60,90,30,0)');gnd.addColorStop(1,'rgba(20,40,10,0.8)');
      ctx.fillStyle=gnd;ctx.fillRect(0,h*0.7,w,h*0.3);
    }
  },
  {
    name: '星空夜讀', emoji: '🌙',
    draw: (ctx, w, h) => {
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,'#02030f');g.addColorStop(0.5,'#0a0a2e');g.addColorStop(1,'#0d0618');
      ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
      for(let i=0;i<180;i++){
        const sx=Math.random()*w,sy=Math.random()*h*0.85,sr=Math.random()*1.8;
        ctx.fillStyle=`rgba(255,255,255,${0.3+Math.random()*0.7})`;
        ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle='#fef0c0';ctx.shadowColor='#ffe066';ctx.shadowBlur=30;
      ctx.beginPath();ctx.arc(w*0.75,h*0.12,36,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#0a0a2e';ctx.beginPath();ctx.arc(w*0.75+14,h*0.12-8,30,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      const mw=ctx.createLinearGradient(0,h*0.1,w,h*0.6);
      mw.addColorStop(0,'rgba(100,80,200,0)');mw.addColorStop(0.4,'rgba(100,80,200,0.07)');
      mw.addColorStop(0.6,'rgba(150,120,220,0.05)');mw.addColorStop(1,'rgba(100,80,200,0)');
      ctx.fillStyle=mw;ctx.fillRect(0,0,w,h);
    }
  },
  {
    name: '咖啡書屋', emoji: '☕',
    draw: (ctx, w, h) => {
      const g=ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,'#3b1e0a');g.addColorStop(1,'#1e0d04');
      ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
      for(let row=0;row<Math.ceil(h/22);row++){
        const offset=(row%2)*40;
        for(let col=-1;col<Math.ceil(w/80)+1;col++){
          const bx=col*80+offset,by=row*22;
          ctx.fillStyle=`hsl(${15+Math.random()*10},${40+Math.random()*20}%,${18+Math.random()*8}%)`;
          ctx.fillRect(bx+1,by+1,76,18);
        }
      }
      const wg=ctx.createRadialGradient(w*0.5,h*0.3,20,w*0.5,h*0.3,h*0.5);
      wg.addColorStop(0,'rgba(255,180,60,0.35)');wg.addColorStop(1,'rgba(255,120,20,0)');
      ctx.fillStyle=wg;ctx.fillRect(0,0,w,h);
      const tg=ctx.createLinearGradient(0,h*0.72,0,h);
      tg.addColorStop(0,'#5c3010');tg.addColorStop(1,'#2e1808');
      ctx.fillStyle=tg;ctx.fillRect(0,h*0.72,w,h*0.28);
    }
  },
  {
    name: '霓虹書城', emoji: '🌈',
    draw: (ctx, w, h) => {
      ctx.fillStyle='#050510';ctx.fillRect(0,0,w,h);
      ctx.strokeStyle='rgba(0,200,255,0.15)';ctx.lineWidth=1;
      const vp={x:w/2,y:h*0.55};
      for(let i=0;i<=14;i++){const fx=(i/14)*w;ctx.beginPath();ctx.moveTo(fx,h);ctx.lineTo(vp.x,vp.y);ctx.stroke();}
      for(let j=1;j<=8;j++){
        const t=j/8,lx=vp.x+(0-vp.x)*t,rx=vp.x+(w-vp.x)*t,ly=vp.y+(h-vp.y)*t;
        ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(rx,ly);ctx.stroke();
      }
      [{x:w*0.2,y:h*0.2,r:60,col:'rgba(255,0,180,0.25)'},{x:w*0.8,y:h*0.15,r:50,col:'rgba(0,200,255,0.2)'},{x:w*0.5,y:h*0.1,r:70,col:'rgba(120,0,255,0.2)'}].forEach(n=>{
        const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
        ng.addColorStop(0,n.col);ng.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ng;ctx.fillRect(0,0,w,h);
      });
    }
  },
  {
    name: '花園讀書台', emoji: '🌸',
    draw: (ctx, w, h) => {
      const g=ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,'#87ceeb');g.addColorStop(0.55,'#c8e8b0');g.addColorStop(1,'#6aaa40');
      ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
      function cloud(cx,cy,cr,a){
        ctx.fillStyle=`rgba(255,255,255,${a})`;
        [[0,0,cr],[cr*0.8,cr*0.2,cr*0.7],[-cr*0.8,cr*0.15,cr*0.65],[cr*1.5,0,cr*0.5],[-cr*1.5,0,cr*0.45]].forEach(([ox,oy,or])=>{ctx.beginPath();ctx.arc(cx+ox,cy+oy,or,0,Math.PI*2);ctx.fill();});
      }
      cloud(w*0.2,h*0.12,24,0.85);cloud(w*0.7,h*0.08,18,0.8);cloud(w*0.5,h*0.18,20,0.7);
      const flowerColors=['#ffb7d5','#ff9ee0','#e8b4ff','#ffcce0','#ffd6b8'];
      for(let i=0;i<20;i++){
        const fx=Math.random()*w,fy=h*0.55+Math.random()*h*0.45,fs=8+Math.random()*12;
        const col=flowerColors[Math.floor(Math.random()*flowerColors.length)];
        for(let p=0;p<6;p++){const a=(p/6)*Math.PI*2;ctx.fillStyle=col;ctx.beginPath();ctx.arc(fx+Math.cos(a)*fs*0.8,fy+Math.sin(a)*fs*0.8,fs*0.55,0,Math.PI*2);ctx.fill();}
        ctx.fillStyle='#ffe066';ctx.beginPath();ctx.arc(fx,fy,fs*0.45,0,Math.PI*2);ctx.fill();
      }
      const sun=ctx.createRadialGradient(w*0.85,h*0.05,0,w*0.85,h*0.05,h*0.6);
      sun.addColorStop(0,'rgba(255,220,80,0.3)');sun.addColorStop(1,'rgba(255,220,80,0)');
      ctx.fillStyle=sun;ctx.fillRect(0,0,w,h);
    }
  }
];

// ============================================================
// STATE
// ============================================================
let selectedBg = null;
let stream = null;
let cameraReady = false;
let segmentationReady = false;
let shooting = false;
let selfieSegmentation = null;
let animFrameId = null;

// Pre-rendered background images
const bgImageCache = {};

const videoEl = document.getElementById('videoEl');
const compositeCanvas = document.getElementById('compositeCanvas');
const segCanvas = document.getElementById('segCanvas');
const finalCanvas = document.getElementById('finalCanvas');
const cameraWrapper = document.getElementById('cameraWrapper');
const camPrompt = document.getElementById('camPrompt');
const aiStatus = document.getElementById('aiStatus');
const shootBtn = document.getElementById('shootBtn');
const backBtn = document.getElementById('backBtn');
const countdown = document.getElementById('countdown');
const flashOverlay = document.getElementById('flashOverlay');
const dot1 = document.getElementById('dot1');
const dot2 = document.getElementById('dot2');
const dot3 = document.getElementById('dot3');
const toast = document.getElementById('toast');

// Build background grid
const bgGrid = document.getElementById('bgGrid');
BACKGROUNDS.forEach((bg, i) => {
  const div = document.createElement('div');
  div.className = 'bg-thumb';
  div.innerHTML = `<div class="check">✓</div><div class="bg-name">${bg.emoji} ${bg.name}</div>`;
  const pc = document.createElement('canvas');
  pc.width = 120; pc.height = 90;
  bg.draw(pc.getContext('2d'), 120, 90);
  div.insertBefore(pc, div.firstChild);
  div.addEventListener('click', () => {
    document.querySelectorAll('.bg-thumb').forEach(t => t.classList.remove('selected'));
    div.classList.add('selected');
    selectedBg = bg;
    document.getElementById('goToCamera').disabled = false;
  });
  bgGrid.appendChild(div);
});

// ============================================================
// NAVIGATION
// ============================================================
function showScreen(n) {
  ['screen1','screen2','screen3'].forEach((id,i) => {
    document.getElementById(id).classList.toggle('active', i+1===n);
  });
  [dot1,dot2,dot3].forEach((d,i) => {
    d.classList.remove('active','done');
    if(i+1 < n) d.classList.add('done');
    else if(i+1 === n) d.classList.add('active');
  });
}

document.getElementById('goToCamera').addEventListener('click', async () => {
  showScreen(2);
  await initCamera();
});

document.getElementById('backBtn').addEventListener('click', () => {
  stopAll();
  showScreen(1);
});

document.getElementById('retakeBtn').addEventListener('click', () => {
  showScreen(2);
  initCamera();
});

// ============================================================
// MEDIAPIPE SEGMENTATION
// ============================================================
async function initSegmentation() {
  return new Promise((resolve) => {
    selfieSegmentation = new SelfieSegmentation({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
    });
    selfieSegmentation.setOptions({ modelSelection: 1, selfieMode: true });
    selfieSegmentation.onResults(onSegmentationResults);
    selfieSegmentation.initialize().then(() => {
      segmentationReady = true;
      resolve();
    }).catch(err => {
      console.error('Segmentation init failed:', err);
      // Fallback: just use video without segmentation
      segmentationReady = false;
      resolve();
    });
  });
}

let lastSegResult = null;

function onSegmentationResults(results) {
  lastSegResult = results;
}

// ============================================================
// CAMERA
// ============================================================
async function initCamera() {
  cameraReady = false;
  shootBtn.disabled = true;
  camPrompt.style.display = 'flex';
  camPrompt.innerHTML = `<div class="cam-prompt-icon">🤖</div><div>正在載入 AI 去背模型…</div>`;
  aiStatus.style.display = 'none';

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 854 } },
      audio: false
    });
    videoEl.srcObject = stream;

    await new Promise(r => { videoEl.onloadedmetadata = () => { videoEl.play(); r(); }; });

    // Resize canvases
    const rect = cameraWrapper.getBoundingClientRect();
    const W = Math.round(rect.width * window.devicePixelRatio);
    const H = Math.round(rect.height * window.devicePixelRatio);
    compositeCanvas.width = W; compositeCanvas.height = H;
    compositeCanvas.style.width = rect.width + 'px';
    compositeCanvas.style.height = rect.height + 'px';
    segCanvas.width = videoEl.videoWidth || 640;
    segCanvas.height = videoEl.videoHeight || 854;

    camPrompt.innerHTML = `<div class="cam-prompt-icon">✨</div><div>AI 模型載入中…</div>`;

    // Pre-render background
    prerenderBg(W, H);

    // Init segmentation
    await initSegmentation();

    cameraReady = true;
    camPrompt.style.display = 'none';
    aiStatus.style.display = 'block';
    aiStatus.textContent = segmentationReady ? '✨ AI 去背已啟動' : '📷 相機已就緒';
    shootBtn.disabled = false;

    startRenderLoop();

  } catch(e) {
    camPrompt.innerHTML = `<div class="cam-prompt-icon">⚠️</div><div>無法取得相機權限<br><small>請允許瀏覽器使用相機</small></div>`;
    console.error(e);
  }
}

function prerenderBg(W, H) {
  const offscreen = document.createElement('canvas');
  offscreen.width = W; offscreen.height = H;
  if (selectedBg) selectedBg.draw(offscreen.getContext('2d'), W, H);
  bgImageCache.current = offscreen;
}

function stopAll() {
  cameraReady = false;
  segmentationReady = false;
  if(animFrameId) cancelAnimationFrame(animFrameId);
  if(selfieSegmentation) { selfieSegmentation.close(); selfieSegmentation = null; }
  if(stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

// ============================================================
// FILTER STATE
// ============================================================
let currentFilter = 'normal';

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
  });
});

// Apply cartoon/sketch effect to a canvas context
function applyCartoonEffect(srcCanvas, filter) {
  if(filter === 'normal') return srcCanvas;

  const W = srcCanvas.width, H = srcCanvas.height;
  const out = document.createElement('canvas');
  out.width = W; out.height = H;
  const ctx = out.getContext('2d');

  if(filter === 'cartoon' || filter === 'both') {
    // Step 1: Saturate and posterize colors
    ctx.filter = 'saturate(180%) contrast(130%) brightness(105%)';
    ctx.drawImage(srcCanvas, 0, 0);
    ctx.filter = 'none';

    // Step 2: Get image data and posterize
    const imgData = ctx.getImageData(0, 0, W, H);
    const d = imgData.data;
    const levels = 5;
    for(let i = 0; i < d.length; i += 4) {
      d[i]   = Math.round(d[i]   / (255/levels)) * (255/levels);
      d[i+1] = Math.round(d[i+1] / (255/levels)) * (255/levels);
      d[i+2] = Math.round(d[i+2] / (255/levels)) * (255/levels);
    }
    ctx.putImageData(imgData, 0, 0);
  }

  if(filter === 'sketch' || filter === 'both') {
    // Draw edge overlay
    const edgeCanvas = document.createElement('canvas');
    edgeCanvas.width = W; edgeCanvas.height = H;
    const eCtx = edgeCanvas.getContext('2d');

    // Draw source slightly blurred
    eCtx.filter = 'blur(1px)';
    eCtx.drawImage(srcCanvas, 0, 0);
    eCtx.filter = 'none';

    // Difference blend for edges
    eCtx.globalCompositeOperation = 'difference';
    eCtx.filter = 'blur(2px)';
    eCtx.drawImage(srcCanvas, 0, 0);
    eCtx.filter = 'none';

    // Invert edges
    const ed = eCtx.getImageData(0,0,W,H);
    for(let i=0;i<ed.data.length;i+=4){
      ed.data[i]  =255-ed.data[i];
      ed.data[i+1]=255-ed.data[i+1];
      ed.data[i+2]=255-ed.data[i+2];
      // Darken slightly
      const grey=(ed.data[i]+ed.data[i+1]+ed.data[i+2])/3;
      ed.data[i]=ed.data[i+1]=ed.data[i+2]=grey<200?grey*0.3:255;
    }
    eCtx.putImageData(ed,0,0);

    // Overlay edges on output
    ctx.globalCompositeOperation = 'multiply';
    ctx.drawImage(edgeCanvas, 0, 0);
    ctx.globalCompositeOperation = 'source-over';
  }

  return out;
}

// ============================================================
// RENDER LOOP
// ============================================================
let frameCount = 0;
async function startRenderLoop() {
  if(!cameraReady) return;

  const ctx = compositeCanvas.getContext('2d');
  const W = compositeCanvas.width;
  const H = compositeCanvas.height;

  async function loop() {
    if(!cameraReady) return;

    // Every 2 frames, send to segmentation
    if(segmentationReady && selfieSegmentation && frameCount % 2 === 0) {
      try {
        await selfieSegmentation.send({ image: videoEl });
      } catch(e) {}
    }
    frameCount++;

    // Draw background
    if(bgImageCache.current) {
      ctx.drawImage(bgImageCache.current, 0, 0, W, H);
    } else {
      ctx.fillStyle = '#111'; ctx.fillRect(0,0,W,H);
    }

    if(segmentationReady && lastSegResult && lastSegResult.segmentationMask) {
      // Draw person only using segmentation mask
      const sW = segCanvas.width, sH = segCanvas.height;
      const sCtx = segCanvas.getContext('2d');

      // Draw mask
      sCtx.clearRect(0,0,sW,sH);
      sCtx.drawImage(lastSegResult.segmentationMask, 0, 0, sW, sH);

      // Extract person pixels
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = sW; tempCanvas.height = sH;
      const tCtx = tempCanvas.getContext('2d');

      // Draw video mirrored
      tCtx.save();
      tCtx.translate(sW, 0); tCtx.scale(-1, 1);
      tCtx.drawImage(videoEl, 0, 0, sW, sH);
      tCtx.restore();

      // Apply mask
      tCtx.globalCompositeOperation = 'destination-in';
      tCtx.drawImage(segCanvas, 0, 0, sW, sH);
      tCtx.globalCompositeOperation = 'source-over';

      // Apply cartoon/sketch filter
      const filtered = applyCartoonEffect(tempCanvas, currentFilter);

      // Draw person on composite
      ctx.drawImage(filtered, 0, 0, W, H);
    } else {
      // Fallback: draw video with transparency blend
      ctx.save();
      ctx.translate(W, 0); ctx.scale(-1, 1);
      ctx.globalAlpha = 0.85;
      ctx.drawImage(videoEl, 0, 0, W, H);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Watermark
    ctx.save();
    ctx.font = `bold ${Math.round(W*0.032)}px 'Space Mono', monospace`;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.textAlign = 'right';
    ctx.fillText('📚 圖書館打卡', W - 14, H - 12);
    ctx.restore();

    animFrameId = requestAnimationFrame(loop);
  }

  loop();
}

// ============================================================
// SHOOT
// ============================================================
shootBtn.addEventListener('click', () => {
  if(shooting || !cameraReady) return;
  shooting = true;
  shootBtn.disabled = true;
  backBtn.disabled = true;
  let count = 3;
  countdown.style.opacity = '1';
  countdown.textContent = count;
  const tick = setInterval(() => {
    count--;
    if(count > 0) { countdown.textContent = count; }
    else {
      clearInterval(tick);
      countdown.style.opacity = '0';
      capturePhoto();
    }
  }, 900);
});

function capturePhoto() {
  // Flash
  flashOverlay.style.transition = 'opacity 0.08s';
  flashOverlay.style.opacity = '1';
  setTimeout(() => { flashOverlay.style.transition = 'opacity 0.5s'; flashOverlay.style.opacity = '0'; }, 80);

  const W = compositeCanvas.width;
  const H = compositeCanvas.height;

  finalCanvas.width = W;
  finalCanvas.height = H;
  const fctx = finalCanvas.getContext('2d');

  // Copy current composite frame
  fctx.drawImage(compositeCanvas, 0, 0);

  // Add gold frame
  fctx.strokeStyle = '#e8a030';
  fctx.lineWidth = Math.max(4, W*0.008);
  const inset = fctx.lineWidth/2;
  roundRect(fctx, inset, inset, W-inset*2, H-inset*2, 16);
  fctx.stroke();

  // Corners
  const cs = W*0.07, ci = 18;
  fctx.strokeStyle = '#e8a030';
  fctx.lineWidth = Math.max(3, W*0.006);
  [[ci,ci,1,1],[W-ci,ci,-1,1],[ci,H-ci,1,-1],[W-ci,H-ci,-1,-1]].forEach(([cx,cy,dx,dy]) => {
    fctx.beginPath();
    fctx.moveTo(cx+dx*cs,cy); fctx.lineTo(cx,cy); fctx.lineTo(cx,cy+dy*cs);
    fctx.stroke();
  });

  // Badge
  const fs = Math.round(W*0.036);
  fctx.font = `bold ${fs}px 'Space Mono', monospace`;
  const text = '📚 圖書館打卡';
  const tw = fctx.measureText(text).width + 22;
  const bx = W - tw - 10, by = H - fs - 18;
  fctx.fillStyle = 'rgba(26,18,9,0.65)';
  roundRect(fctx, bx, by, tw, fs+12, 8); fctx.fill();
  fctx.fillStyle = '#e8a030';
  fctx.textAlign = 'center';
  fctx.fillText(text, bx+tw/2, by+fs+2);

  stopAll();
  showScreen(3);
  shooting = false;
  shootBtn.disabled = false;
  backBtn.disabled = false;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// Save button → fullscreen display
const fullscreenOverlay = document.getElementById('fullscreenOverlay');
const fullscreenImg = document.getElementById('fullscreenImg');
const fullscreenClose = document.getElementById('fullscreenClose');

document.getElementById('downloadBtn').addEventListener('click', () => {
  // Show image fullscreen for easy long-press save
  fullscreenImg.src = finalCanvas.toDataURL('image/png');
  fullscreenOverlay.classList.add('show');
});

fullscreenClose.addEventListener('click', () => {
  fullscreenOverlay.classList.remove('show');
});

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

window.addEventListener('resize', () => {
  if(cameraReady) {
    const rect = cameraWrapper.getBoundingClientRect();
    const W = Math.round(rect.width * window.devicePixelRatio);
    const H = Math.round(rect.height * window.devicePixelRatio);
    compositeCanvas.width = W; compositeCanvas.height = H;
    compositeCanvas.style.width = rect.width+'px';
    compositeCanvas.style.height = rect.height+'px';
    prerenderBg(W, H);
  }
});
